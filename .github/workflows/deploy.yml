name: Deploy to GitHub Pages

on:
push:
branches:
- main

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: pages
cancel-in-progress: true

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: pnpm/action-setup@v4
    with:
      version: latest

  - uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: pnpm

  - run: pnpm install

  - run: pnpm --filter @workspace/qr-scanner-king build

  - uses: actions/upload-pages-artifact@v3
    with:
      path: artifacts/qr-scanner-king/dist
```

deploy:
environment:
name: github-pages

```
needs: build

runs-on: ubuntu-latest

permissions:
  pages: write
  id-token: write

steps:
  - uses: actions/deploy-pages@v4
```
